<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jessica Truck</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .card {
      text-align: center;
      padding: 40px 30px;
    }
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(45deg, #f093fb, #f5576c);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    h1 {
      color: white;
      font-size: 24px;
      margin-bottom: 8px;
    }
    p {
      color: rgba(255,255,255,0.6);
      margin-bottom: 30px;
      font-size: 14px;
    }
    .btn {
      display: inline-block;
      padding: 16px 40px;
      background: linear-gradient(45deg, #f093fb, #f5576c);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .hint {
      margin-top: 20px;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">🔥</div>
    <h1>Jessica Truck</h1>
    <p>Эксклюзивный контент</p>
    <a class="btn" href="https://www.fanvue.com/jessica_truck">
      Перейти на страницу
    </a>
    <p class="hint">Если не открывается — скопируй в браузер:<br>fanvue.com/jessica_truck</p>
  </div>
</body>
</html>
